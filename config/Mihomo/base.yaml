mode: 'rule'
bind-address: "*"
# ==================== 地理数据库配置 GeoData Configuration ====================
# 用于 IP 和域名的地理位置及分类判断
geox-url:
  # MaxMind 数据库（含中国 IP）
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
  # GeoIP 数据库
  geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  # GeoSite 数据库（域名分类）
  geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  # ASN（自治系统号）数据库，用于更精确的 IP 归属判断
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb
# 是否自动更新 geodata 数据库
geo-auto-update: true # 是否自动更新 geodata
# 更新间隔（小时），24 = 每天更新一次
geo-update-interval: 24 # 更新间隔，单位：小时
# 使用 geodata 模式（而非传统的 IP-CIDR 文件）
geodata-mode: true

# ==================== 日志与控制 ====================
# 日志级别：silent（静默）/ error（错误）/ warning（警告）/ info（信息）/ debug（调试）
log-level: info
# 是否启用 IPv6，true 表示支持 IPv6 流量
ipv6: true
# 外部控制器地址，用于 Web UI 和 API 访问，0.0.0.0:9090 表示监听所有网卡的 9090 端口
external-controller: 0.0.0.0:9090

profile:
  store-selected: true
  store-fake-ip: true
tun:
  enable: true
  stack: 'gvisor'
  dns-hijack:   
    - 'any:53'
    - 'tcp://any:53'
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# ==================== 流量嗅探器 Sniffer ====================
# 嗅探器可以通过分析流量内容还原真实域名，提高分流准确性
sniffer:
  # 启用嗅探功能
  enable: true
  # 使用嗅探结果覆盖连接目标（推荐开启）
  override-destination: true
  # 嗅探协议配置
  sniff:
    # QUIC 协议嗅探（HTTP/3）
    QUIC:
      ports:
      - 443
    # TLS 协议嗅探（HTTPS）
    TLS:
      ports:
      - 443  # 标准 HTTPS 端口
      - 8443  # 常用替代 HTTPS 端口
    # HTTP 协议嗅探
    HTTP:
      ports:
      - 80  # 标准 HTTP 端口
      - 8080-8880  # HTTP 常用端口范围
      override-destination: true
  # 强制对这些域名进行嗅探（即使已经有目标地址）
  force-domain:
    - "+.netflix.com"  # Netflix 主域名
    - "+.nflxvideo.net"  # Netflix CDN
    - "+.amazonaws.com"  # AWS 云服务
    - "+.media.dssott.com"  # Disney+ 流媒体
  # 跳过对这些域名的嗅探（避免干扰）
  skip-domain:
    - "+.apple.com"  # 苹果服务
    - Mijia Cloud  # 米家云服务
    - dlg.io.mi.com  # 小米设备通信
    - "+.oray.com"  # 花生壳服务
    - "+.sunlogin.net"  # 向日葵远程控制
    - "+.push.apple.com"  # 苹果推送服务
  # 解析纯 IP 连接（尝试通过 rDNS 反向解析获得域名）
  parse-pure-ip: true
  # 强制 DNS 映射（对纯 IP 连接尝试 DNS 映射）
  force-dns-mapping: true
  
dns:
  enable: true
  ipv6: true
  prefer-h3: false
  respect-rules: true
  use-hosts: true
  use-system-hosts: true
  listen: '0.0.0.0:5335'
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter:
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
    - 'geosite:private'
    - 'geosite:connectivity-check'
    - 'geosite:cn'
  default-nameserver:
    - system
    - 223.5.5.5
    - 114.114.114.114
    - 180.184.1.1
    - 119.29.29.29
    - 180.76.76.76
  fallback: null
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
    - "tls://dot.pub"
    - "tls://dns.alidns.com"
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
    - "tls://dot.pub"
    - "tls://dns.alidns.com"
  direct-nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 180.184.1.1
    - 119.29.29.29
    - 180.76.76.76
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "domain-suffix:software.tongji.edu.cn":
      - 202.120.190.208
      - 202.120.190.108
      - 202.96.209.5
    "domain-suffix:linux.do": 
      - 'https://doh.pub/dns-query'
      - 'https://dns.alidns.com/dns-query'
      - "tls://dot.pub"
      - "tls://dns.alidns.com"
    "geosite:cn":
      - system
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    "geosite:steam@cn":
      - system
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    "geosite:category-games@cn":
      - system
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    "geosite:gfw":
      - 'https://1.1.1.1/dns-query'
      - 'https://8.8.8.8/dns-query'
      - 'tls://1.1.1.1:853'
      - 'tls://8.8.8.8:853'
