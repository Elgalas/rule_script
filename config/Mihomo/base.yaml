port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
unified-delay: true

geox-url:
  geoip: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-without-asn.mmdb"
  asn: "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-asn.mmdb"

geo-auto-update: true
geo-update-interval: 24
geodata-mode: true

# 是否启用 IPv6，true 表示支持 IPv6 流量
ipv6: true

clash-for-android:
  append-system-dns: false

profile:
  store-selected: true
  store-fake-ip: true
  tracing: true


experimental:
  sniff-tls-sni: true


# ==================== 流量嗅探器 Sniffer ====================
# 嗅探器可以通过分析流量内容还原真实域名，提高分流准确性
sniffer:
  # 启用嗅探功能
  enable: true
  # 使用嗅探结果覆盖连接目标（推荐开启）
  override-destination: true
  # 解析纯 IP 连接（尝试通过 rDNS 反向解析获得域名）
  parse-pure-ip: true
  # 强制 DNS 映射（对纯 IP 连接尝试 DNS 映射）
  force-dns-mapping: true
  # 嗅探协议配置
  sniff:
    # QUIC 协议嗅探（HTTP/3）
    QUIC:
      ports:
      - 443  # 标准 HTTPS 端口
      - 8443  # 常用替代 HTTPS 端口
    # TLS 协议嗅探（HTTPS）
    TLS:
      ports:
      - 443  # 标准 HTTPS 端口
      - 8443  # 常用替代 HTTPS 端口
    # HTTP 协议嗅探
    HTTP:
      ports:
      - 80  # 标准 HTTP 端口
      - 8080-8880  # HTTP 常用端口范围
  # 强制对这些域名进行嗅探（即使已经有目标地址）
  force-domain:
    - "+.netflix.com"  # Netflix 主域名
    - "+.nflxvideo.net"  # Netflix CDN
    - "+.amazonaws.com"  # AWS 云服务
    - "+.media.dssott.com"  # Disney+ 流媒体
  # 跳过对这些域名的嗅探（避免干扰）
  skip-domain:
    - "+.apple.com"  # 苹果服务
    - Mijia Cloud  # 米家云服务
    - dlg.io.mi.com  # 小米设备通信
    - "+.oray.com"  # 花生壳服务
    - "+.sunlogin.net"  # 向日葵远程控制
    - "+.push.apple.com"  # 苹果推送服务
  
dns:
  enable: true
  ipv6: true
  prefer-h3: false
  respect-rules: true
  use-hosts: true
  use-system-hosts: true
  listen: 127.0.0.1:1053
  enhanced-mode: 'fake-ip'
  fake-ip-range: '198.18.0.1/16'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter:
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
    - 'geosite:private'
    - 'geosite:connectivity-check'
    - 'geosite:cn'
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 180.184.1.1
    - 119.29.29.29
    - 180.76.76.76
  fallback: []
  fallback-filter:
    geoip: false
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
    - "tls://dot.pub"
    - "tls://dns.alidns.com"
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
    - "tls://dot.pub"
    - "tls://dns.alidns.com"
  direct-nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 180.184.1.1
    - 119.29.29.29
    - 180.76.76.76
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "domain-suffix:tongji.edu.cn":
      - 202.120.190.208
      - 202.120.190.108
      - 202.96.209.5
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    "domain-suffix:linux.do": 
      - 'https://doh.pub/dns-query'
      - 'https://dns.alidns.com/dns-query'
      - "tls://dot.pub"
      - "tls://dns.alidns.com"
    "geosite:cn":
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    "geosite:steam@cn":
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    "geosite:category-games@cn":
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    "geosite:gfw":
      - 'https://1.1.1.1/dns-query'
      - 'https://8.8.8.8/dns-query'
      - 'tls://1.1.1.1:853'
      - 'tls://8.8.8.8:853'
