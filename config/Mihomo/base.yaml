    - 'https://dns.alidns.com/dns-query'
    - "tls://dot.pub"
    - "tls://dns.alidns.com"
  direct-nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 180.184.1.1
    - 119.29.29.29
    - 180.76.76.76
  direct-nameserver-follow-policy: true
  nameserver-policy:
