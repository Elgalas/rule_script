;本模板为 Full 模板，可以自由添加规则和分组，无性能考量，较为臃肿
;test

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果


;下方参数请勿修改
enable_rule_generator=false
overwrite_original_rules=false
clash_rule_base=https://raw.githubusercontent.com/Elgalas/rule_script/refs/heads/main/config/Mihomo/base_new.yaml
