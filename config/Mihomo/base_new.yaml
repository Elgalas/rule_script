    }

  proxies_direct:
    &proxies_direct {
      proxies:
        [
          '默认代理',
          '低倍率',
          '直连',
          '香港',
          '日本',
          '美国',
          '新加坡',
          '台湾省',
          '其他',
        ],
    }

  proxies_direct_first:
