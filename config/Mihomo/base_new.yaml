#  ---------说明---------
#  mihomo配置（全量版）
#  作者：AIsouler
#  原仓库：https://github.com/AIsouler/MyClash
#  配置链接：https://github.com/AIsouler/MyClash/blob/main/Config/mihomoConfig.yaml
#  友情推荐，非常好用、省电且内存占用低的代理软件：https://github.com/appshubcc/Bettbox
#  ---------------------

# --- 锚点定义 (通用属性) ---
proxy_providers_common:
  &proxy_providers_common {
    type: http,
    interval: 86400,
    proxy: DIRECT,
    health-check:
      {
        enable: true,
        url: https://g.cn/generate_204,
        interval: 600,
        lazy: true,
      },
  }

# 全局过滤节点
global_exclude_filter:
  &global_exclude_filter {
    exclude-filter: '群|Traffic|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|选择|剩余|公益|发布|DIZTNA|通路|登录|禁止|定时|渠道|牢记|永久|余额|阁下|本站|刷新|导航|⚠️|@|Expire|http|com',
  }

# 订阅提供者，如果你想要添加多个订阅提供者，可以复制 provider1 的配置块，并修改 url 、 path 和 additional-suffix 字段。
# proxy-providers:
#   provider1:
#     <<: [*proxy_providers_common, *global_exclude_filter]
#     url: '' # 此处引号中间填入机场订阅链接
#     age-secret-key: '' # 此处填入机场订阅链接解密私钥，如果机场订阅链接需要解密才能使用，请将解密私钥填入引号中间，否则不要改动此项
#     path: ./proxy_providers/provider1.yaml
#     override:
#       additional-suffix: '| p1' # 给节点名称后面加后缀，防止不同订阅的节点重名导致出现问题
  # provider2:
  #   <<: [*proxy_providers_common, *global_exclude_filter]
  #   url: '' # 此处引号中间填入机场订阅链接
  #   age-secret-key: '' # 此处填入机场订阅链接解密私钥，如果机场订阅链接需要解密才能使用，请将解密私钥填入引号中间，否则不要改动此项
  #   path: ./proxy_providers/provider2.yaml
  #   override:
  #     additional-suffix: '| p2'

# --- 基础全局配置 ---

allow-lan: true
ipv6: true
bind-address: '*'
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict
external-controller: '[::]:9090'
external-ui: ui
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'

profile:
  store-selected: true
  store-fake-ip: true

# 国内外 DNS 定义
chinaDNS:
  &chinaDNS [
    'https://dns.alidns.com/dns-query#DIRECT',
    'https://doh.pub/dns-query#DIRECT',
  ]
foreignDNS:
  &foreignDNS [
    'https://dns.cloudflare.com/dns-query#默认代理',
    'https://dns.google/dns-query#默认代理',
  ]

dns:
  enable: true
  ipv6: true
  listen: '0.0.0.0:1053'
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: 'fc00::/18'
  fake-ip-filter-mode: 'blacklist'
  fake-ip-filter: ['*.lan', '+.224837439.xyz', 'rule-set:private', 'rule-set:fakeip_filter']
  proxy-server-nameserver: 
    - udp://127.0.0.1:1053
  default-nameserver: ['223.5.5.5', '119.29.29.29']
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback: []
  fallback-filter:
    geoip: false
  nameserver-policy:
    'rule-set:cn':
      - '223.5.5.5'
      - '119.29.29.29'
    "domain-suffix:tongji.edu.cn":
      - 202.120.190.208
      - 202.120.190.108
      - 202.96.209.5
      - 223.5.5.5
      - 114.114.114.114
      - 180.184.1.1
      - 119.29.29.29
      - 180.76.76.76
    'rule-set:my_linuxdo':
      - 'https://dns.alidns.com/dns-query'
      - 'https://doh.pub/dns-query'
    'rule-set:google':
      - 'https://dns.cloudflare.com/dns-query'
      - 'https://dns.google/dns-query'
  direct-nameserver: ['system', '223.5.5.5', '119.29.29.29']
  direct-nameserver-follow-policy: true
  respect-rules: true

experimental:
  sniff-tls-sni: true
  
hosts:
  'dns.alidns.com': ['223.5.5.5', '223.6.6.6']
  'doh.pub': ['1.12.12.12', '120.53.53.53']
  'dns.cloudflare.com': ['1.1.1.1', '1.0.0.1']
  'dns.google': ['8.8.8.8', '8.8.4.4']

  # 解决谷歌商店无法下载的问题
  'services.googleapis.cn': ['services.googleapis.com']

  # 屏蔽哔哩哔哩PCDN，解决访问视频卡顿问题
  '+.mcdn.bilivideo.com': ['0.0.0.0']
  '+.mcdn.bilivideo.cn': ['0.0.0.0']

  # proxy
  'aexbjbgp01.224837439.xyz': ['a6ac3560-59f7-11f1.224837439.xyz']
  'aexgzbgp01.224837439.xyz': ['a6ac3560-59f7-11f2.224837439.xyz']
  'aexshbgp01.224837439.xyz': ['a6ac3560-59f7-11f3.224837439.xyz']

ntp:
  enable: true
  write-to-system: false
  server: 'ntp.aliyun.com'
  port: 123
  interval: 60

tun:
  enable: true
  mtu: 9000
  stack: 'gvisor'
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  # 端点无关 NAT（提高 NAT 类型兼容性，适用于 P2P 和游戏）
  endpoint-independent-nat: true

# ==================== 流量嗅探器 Sniffer ====================
# 嗅探器可以通过分析流量内容还原真实域名，提高分流准确性
sniffer:
  # 启用嗅探功能
  enable: true
  # 使用嗅探结果覆盖连接目标（推荐开启）
  override-destination: true
  # 解析纯 IP 连接（尝试通过 rDNS 反向解析获得域名）
  parse-pure-ip: true
  # 强制 DNS 映射（对纯 IP 连接尝试 DNS 映射）
  force-dns-mapping: true
  # 嗅探协议配置
  sniff:
    # QUIC 协议嗅探（HTTP/3）
    QUIC:
      ports:
      - 443  # 标准 HTTPS 端口
      - 8443  # 常用替代 HTTPS 端口
    # TLS 协议嗅探（HTTPS）
    TLS:
      ports:
      - 443  # 标准 HTTPS 端口
      - 8443  # 常用替代 HTTPS 端口
    # HTTP 协议嗅探
    HTTP:
      ports:
      - 80  # 标准 HTTP 端口
      - 8080-8880  # HTTP 常用端口范围
  # 强制对这些域名进行嗅探（即使已经有目标地址）
  force-domain:
    - "+.netflix.com"  # Netflix 主域名
    - "+.nflxvideo.net"  # Netflix CDN
    - "+.amazonaws.com"  # AWS 云服务
    - "+.media.dssott.com"  # Disney+ 流媒体
  # 跳过对这些域名的嗅探（避免干扰）
  skip-domain:
    - "+.apple.com"  # 苹果服务
    - Mijia Cloud  # 米家云服务
    - dlg.io.mi.com  # 小米设备通信
    - "+.oray.com"  # 花生壳服务
    - "+.sunlogin.net"  # 向日葵远程控制
    - "+.push.apple.com"  # 苹果推送服务
    

    
# 直连节点
proxies:
  - { name: '🇨🇳 直连 | IPv4优先', type: direct, ip-version: ipv4-prefer }
  - { name: '🇨🇳 直连 | IPv6优先', type: direct, ip-version: ipv6-prefer }
  - { name: '🇨🇳 直连 | 双栈', type: direct }

