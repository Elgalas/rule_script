    proxies: ['高倍率节点-自动选择', '高倍率节点-故障转移', '高倍率节点-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Airport.png'
  - name: '高倍率节点-自动选择'
    <<: [*group_common_auto, *high_filter]
  - name: '高倍率节点-故障转移'
    <<: [*group_common_fallback, *high_filter]
  - name: '高倍率节点-负载均衡'
