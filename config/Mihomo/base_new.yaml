# --- 策略组 (Proxy Groups) ---

# 策略组通用配置
group_common:
  group_common_select:
    &group_common_select {
      type: select,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
    }

  group_common_auto:
    &group_common_auto {
      type: url-test,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
      tolerance: 100,
      include-all-providers: true,
      exclude-type: 'DIRECT',
      icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png',
      hidden: true,
    }

  group_common_fallback:
    &group_common_fallback {
      type: fallback,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
      include-all-providers: true,
      exclude-type: 'DIRECT',
      icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png',
      hidden: true,
    }

  group_common_load:
    &group_common_load {
      type: load-balance,
      interval: 600,
      timeout: 3000,
      max-failed-times: 3,
      empty-fallback: REJECT,
      url: 'https://g.cn/generate_204',
      lazy: true,
      strategy: 'sticky-sessions',
      include-all-providers: true,
      exclude-type: 'DIRECT',
      icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Round_Robin.png',
      hidden: true,
    }

# 通用代理节点组
proxies_common:
  proxies_default:
    &proxies_default {
      proxies:
        [
          '默认代理',
          '低倍率',
          '香港',
          '日本',
          '美国',
          '新加坡',
          '台湾省',
          '其他',
